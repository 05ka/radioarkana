<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Arkana Cam</title>

  <!-- PWA — manifest propio -->
  <link rel="manifest" href="/camera-manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Arkana Cam">
  <link rel="apple-touch-icon" href="/icon-cam-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --red: #e63030;
      --red-dim: #7a1a1a;
      --white: #f0ece4;
      --gray: #555;
      --font-head: 'Bebas Neue', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: var(--font-mono);
      color: var(--white);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── VIEWPORT CÁMARA ─────────────────────────────────────────────────── */
    #viewport {
      position: fixed;
      inset: 0;
      bottom: calc(env(safe-area-inset-bottom) + 172px);
      background: #000;
      overflow: hidden;
      /* Bloquear zoom del navegador sobre el viewport */
      touch-action: none;
    }

    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      /* El zoom se aplica aquí via transform — el HUD queda encima y no escala */
      transform-origin: center center;
      transition: transform 0.05s linear;
      will-change: transform;
    }

    /* ── HUD sobre el vídeo ──────────────────────────────────────────────── */
    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Watermark — fila superior derecha (zoom indicator queda debajo) */
    #watermark {
      position: absolute;
      top: max(20px, env(safe-area-inset-top) + 12px);
      right: 20px;
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(230,48,48,0.85);
      text-shadow: 0 1px 6px rgba(0,0,0,0.95);
    }

    /* Overlay inferior con cartas */
    #overlayBar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 52px 24px 20px;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.88) 0%,
        rgba(0,0,0,0.6) 55%,
        transparent 100%
      );
    }

    #cardsDisplay {
      font-family: var(--font-head);
      font-size: clamp(24px, 7vw, 42px);
      letter-spacing: 0.04em;
      color: var(--white);
      line-height: 1.05;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    }

    #metaDisplay {
      margin-top: 6px;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }

    /* ── ZOOM INDICATOR ──────────────────────────────────────────────────── */
    #zoomIndicator {
      position: absolute;
      /* Movido a la derecha, debajo del watermark para no solaparse */
      top: max(44px, env(safe-area-inset-top) + 36px);
      right: 20px;
      left: auto;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(240,236,228,0.9);
      text-shadow: 0 1px 6px rgba(0,0,0,0.95);
      background: rgba(0,0,0,0.45);
      padding: 4px 8px;
      border: 1px solid rgba(230,48,48,0.3);
      border-radius: 2px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #zoomIndicator.visible { opacity: 1; }

    /* ── ZOOM RESET BTN ──────────────────────────────────────────────────── */
    #zoomResetBtn {
      position: absolute;
      /* Movido a la derecha, debajo del zoomIndicator */
      top: max(72px, env(safe-area-inset-top) + 64px);
      right: 20px;
      left: auto;
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(230,48,48,0.4);
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 2px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #zoomResetBtn.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #zoomResetBtn:active { background: rgba(230,48,48,0.2); }

    /* ── SQUARE GUIDE ────────────────────────────────────────────────────── */
    .sq-mask {
      position: absolute;
      background: rgba(0,0,0,0.5);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #squareGuide {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #squareGuide.visible { opacity: 1; }
    .sq-border { position: absolute; inset: 0; border: 1px solid rgba(255,255,255,0.15); }
    .sq-corner { position: absolute; width: 18px; height: 18px; border-color: var(--red); border-style: solid; }
    .sq-corner.tl { top: 0; left: 0;   border-width: 2px 0 0 2px; }
    .sq-corner.tr { top: 0; right: 0;  border-width: 2px 2px 0 0; }
    .sq-corner.bl { bottom: 0; left: 0;  border-width: 0 0 2px 2px; }
    .sq-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
    .sq-label {
      position: absolute;
      bottom: -20px; left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--red);
      white-space: nowrap;
    }

    /* ── PANEL INFERIOR ──────────────────────────────────────────────────── */
    #controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(172px + env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Fila formato */
    #formatBar {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .fmt-btn {
      flex: 1;
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--gray);
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 0;
      cursor: pointer;
      transition: all 0.2s;
    }
    .fmt-btn:last-child { border-right: none; }
    .fmt-btn.active { color: var(--red); }
    .fmt-btn:not(.active):hover { color: var(--white); }

    /* Fila botones principales */
    #mainRow {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }

    /* Botón lateral */
    .side-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--gray);
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 72px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .side-btn:hover { border-color: var(--gray); color: var(--white); }
    .side-btn svg { display: block; }

    /* Disparador */
    #shutter {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--white);
      border: 4px solid #444;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    #shutter:hover { border-color: var(--red); transform: scale(1.04); }
    #shutter:active { transform: scale(0.92); background: var(--red); }

    /* ── BARRA SUPERIOR ──────────────────────────────────────────────────── */
    #topBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      top: env(safe-area-inset-top, 0);
      padding: max(12px, env(safe-area-inset-top) + 6px) 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      z-index: 10;
      pointer-events: auto;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
    }

    /* Botón refresh de tirada */
    #refreshTrio {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(230,48,48,0.4);
      color: var(--red);
      border-radius: 2px;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      flex-shrink: 0;
    }
    #refreshTrio:hover { background: rgba(230,48,48,0.18); border-color: var(--red); }
    #refreshTrio.spinning svg { animation: spin 0.45s ease-out; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ── IDIOMA toggle ────────────────────────────────────────────────────── */
    #langToggle {
      display: flex;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 2px;
      overflow: hidden;
    }
    .lang-opt {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 5px 10px;
      background: rgba(0,0,0,0.55);
      color: var(--gray);
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .lang-opt.active { background: var(--red); color: var(--white); }
    .lang-opt:not(.active):hover { color: var(--white); }

    /* ── PREVIEW ─────────────────────────────────────────────────────────── */
    #preview {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #000;
      flex-direction: column;
    }
    #preview.active { display: flex; }

    #previewImg {
      flex: 1;
      object-fit: contain;
      width: 100%;
      display: block;
    }

    #previewActions {
      background: var(--bg);
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      display: flex;
      gap: 8px;
    }

    .prev-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 14px 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .prev-btn.primary { border-color: var(--red); color: var(--red); }
    .prev-btn:hover { background: rgba(230,48,48,0.08); border-color: var(--red); color: var(--red); }

    /* ── SPLASH / PERMISO ────────────────────────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      z-index: 300;
      padding: 40px 32px;
      text-align: center;
    }
    #splash.hidden { display: none; }

    .splash-logo {
      font-family: var(--font-head);
      font-size: clamp(52px, 18vw, 80px);
      line-height: 0.88;
      letter-spacing: 0.02em;
    }
    .splash-logo span { color: var(--red); }

    .splash-sub {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .splash-btn {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 16px 36px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .splash-btn:hover { background: rgba(230,48,48,0.1); }

    .splash-note {
      font-size: 9px;
      color: var(--gray);
      letter-spacing: 0.12em;
      line-height: 1.7;
      max-width: 280px;
    }

    /* ── HANDLE INPUT ────────────────────────────────────────────────────── */
    #handleWrap {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      padding: 6px 10px;
      gap: 6px;
      border-top: none;
    }
    .handle-at { font-size: 11px; color: var(--red); flex-shrink: 0; }
    #handleInput {
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      width: 100%;
    }
    #handleInput::placeholder { color: var(--gray); }

    /* noise texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 400;
      opacity: 0.35;
    }

    /* flash al disparar */
    #flashOverlay {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 500;
      transition: opacity 0.05s;
    }
    #flashOverlay.flash { opacity: 0.7; }

    /* ── MODE SWITCHER (foto / vídeo / archivo) ──────────────────────────── */
    #modeSwitcher {
      display: flex;
      justify-content: center;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }
    .mode-btn {
      flex: 1;
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--gray);
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 0;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .mode-btn:last-child { border-right: none; }
    .mode-btn.active { color: var(--red); }
    .mode-btn svg { flex-shrink: 0; }

    /* ── GRABACIÓN ───────────────────────────────────────────────────────── */
    #recIndicator {
      position: absolute;
      top: max(20px, env(safe-area-inset-top) + 12px);
      left: 20px;
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(230,48,48,0.5);
      padding: 5px 10px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #recIndicator.visible { display: flex; }
    #recDot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      animation: blink-rec 1s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink-rec {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }
    #recTimer {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--white);
    }

    /* Shutter en modo vídeo */
    #shutter.rec-mode {
      background: transparent;
      border: 4px solid var(--red);
    }
    #shutter.rec-mode::after {
      content: '';
      display: block;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--red);
      margin: auto;
      margin-top: 14px;
      transition: all 0.2s;
    }
    #shutter.recording {
      background: transparent;
      border: 4px solid var(--red);
    }
    #shutter.recording::after {
      content: '';
      display: block;
      width: 22px; height: 22px;
      border-radius: 4px;
      background: var(--red);
      margin: auto;
      margin-top: 17px;
      transition: all 0.2s;
    }

    /* ── VIDEO PREVIEW ───────────────────────────────────────────────────── */
    #videoPreview {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #000;
      flex-direction: column;
    }
    #videoPreview.active { display: flex; }
    #previewVideo {
      flex: 1;
      width: 100%;
      object-fit: contain;
      display: block;
    }

    /* ── ARCHIVE OVERLAY PANEL ───────────────────────────────────────────── */
    #archivePanel {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(0,0,0,0.92);
      flex-direction: column;
    }
    #archivePanel.active { display: flex; }

    #archiveHeader {
      padding: max(16px, env(safe-area-inset-top) + 10px) 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .arch-title {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gray);
    }
    .arch-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--gray);
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .arch-close:hover { border-color: var(--red); color: var(--red); }

    #archiveGrid {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      align-content: start;
    }

    .arch-thumb {
      aspect-ratio: 1;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, opacity 0.2s;
      display: block;
      width: 100%;
    }
    .arch-thumb:hover { opacity: 0.8; }
    .arch-thumb.selected { border-color: var(--red); }

    #archiveActions {
      padding: 14px 20px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .arch-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 13px 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .arch-btn.primary { border-color: var(--red); color: var(--red); }
    .arch-btn:hover { background: rgba(230,48,48,0.08); border-color: var(--red); color: var(--red); }
    #archiveUploadBtn {
      display: none;
    }

    /* Overlay activo sobre el viewport */
    #overlayImgEl {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
      opacity: 0.42;
      display: none;
      mix-blend-mode: screen;
    }
    #overlayImgEl.visible { display: block; }

    /* Control de opacidad del overlay */
    #overlayControls {
      position: absolute;
      bottom: 56px;
      left: 16px;
      right: 16px;
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(230,48,48,0.3);
      padding: 8px 14px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #overlayControls.visible { display: flex; }
    .ov-label {
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray);
      white-space: nowrap;
      flex-shrink: 0;
    }
    #overlayOpacity {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    #overlayOpacity::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--red);
      cursor: pointer;
    }
    #overlayOpacity::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--red);
      border: none;
      cursor: pointer;
    }
    .ov-remove {
      background: none;
      border: none;
      color: var(--gray);
      cursor: pointer;
      padding: 2px;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .ov-remove:hover { color: var(--red); }

    /* Indicador de modo archivo activo en formatBar */
    #archiveActiveBar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(230,48,48,0.06);
    }
    #archiveActiveBar.visible { display: flex; }
    .arch-active-label {
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
    }
    .arch-change-btn {
      background: none;
      border: 1px solid rgba(230,48,48,0.35);
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 7px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 9px;

<script>
  // ── CONSTANTES ─────────────────────────────────────────────────────────────
  const WORKER_URL = 'https://gentle-glitter-2552.oscardevalle.workers.dev';

  const CARDS = {
    es: ["El Loco","El Mago","La Papisa","La Emperatriz","El Emperador","El Papa",
         "El Enamorado","El Carro","La Fuerza","El Ermitaño","La Rueda de la Fortuna",
         "La Justicia","El Colgado","La Muerte","La Templanza","El Diablo","La Torre",
         "La Estrella","La Luna","El Sol","El Juicio","El Mundo"],
    en: ["The Fool","The Magician","The High Priestess","The Empress","The Emperor",
         "The Hierophant","The Lovers","The Chariot","Strength","The Hermit",
         "The Wheel of Fortune","The Justice","The Hanged Man","Death","The Temperance",
         "The Devil","The Tower","The Star","The Moon","The Sun","The Judgement","The World"]
  };

  const LANG_CONFIG = {
    es: { lang: 'es-ES' },
    en: { lang: 'en-US' }
  };

  // ── ESTADO ─────────────────────────────────────────────────────────────────
  let currentLang   = localStorage.getItem('arkana-lang') || 'es';
  let currentTrio   = [];
  let cameraStream  = null;
  let facingMode    = 'environment';
  let squareMode    = false;
  let quantumPool   = [];
  let qrngLoading   = false;

  // ── ZOOM STATE ─────────────────────────────────────────────────────────────
  let currentZoom     = 1.0;
  let minZoom         = 1.0;
  let maxZoom         = 5.0;   // fallback; se actualiza con las capacidades reales
  let nativeZoomSupported = false;
  let zoomHideTimer   = null;

  // ── INIT ───────────────────────────────────────────────────────────────────
  (async function boot() {
    applyLang(currentLang);
    restoreHandle();
    initPinchZoom();

    try {
      const perm = await navigator.permissions.query({ name: 'camera' });
      if (perm.state === 'granted') {
        document.getElementById('splash').classList.add('hidden');
        await startStream();
        newTrio();
        fillQuantumPool();
        return;
      }
    } catch(e) {}

    document.getElementById('splash').classList.remove('hidden');
    fillQuantumPool();
  })();

  async function initCamera() {
    document.getElementById('splash').classList.add('hidden');
    await startStream();
    newTrio();
  }

  // ── STREAM ─────────────────────────────────────────────────────────────────
  async function startStream() {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
    } catch(e) {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      } catch(err) {
        document.getElementById('splash').classList.remove('hidden');
        document.getElementById('splashBtn').textContent = 'Reintentar';
        return;
      }
    }
    document.getElementById('video').srcObject = cameraStream;

    // Detectar soporte de zoom nativo (Android Chrome)
    await detectNativeZoom();

    // Reset zoom al cambiar de cámara
    currentZoom = 1.0;
    applyZoom(1.0, false);
  }

  function flipCamera() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startStream();
  }

  // ── ZOOM — DETECCIÓN NATIVA ────────────────────────────────────────────────
  async function detectNativeZoom() {
    nativeZoomSupported = false;
    if (!cameraStream) return;
    const track = cameraStream.getVideoTracks()[0];
    if (!track) return;
    try {
      const caps = track.getCapabilities();
      if (caps.zoom) {
        nativeZoomSupported = true;
        minZoom = caps.zoom.min ?? 1.0;
        maxZoom = caps.zoom.max ?? 5.0;
      }
    } catch(e) {}
  }

  // ── ZOOM — APLICAR ─────────────────────────────────────────────────────────
  async function applyZoom(zoom, showUI = true) {
    zoom = Math.min(maxZoom, Math.max(minZoom, zoom));
    currentZoom = zoom;

    const video = document.getElementById('video');
    const indicator = document.getElementById('zoomIndicator');
    const resetBtn  = document.getElementById('zoomResetBtn');

    // 1. Zoom óptico nativo (Android Chrome) — calidad máxima
    if (nativeZoomSupported && cameraStream) {
      const track = cameraStream.getVideoTracks()[0];
      if (track) {
        try {
          await track.applyConstraints({ advanced: [{ zoom }] });
        } catch(e) {
          // Si falla el nativo, caemos al CSS
          video.style.transform = `scale(${zoom})`;
        }
      }
    } else {
      // 2. Zoom CSS — funciona en iOS Safari y resto de browsers
      video.style.transform = `scale(${zoom})`;
    }

    // Actualizar UI
    const zoomText = zoom.toFixed(1) + '×';
    indicator.textContent = zoomText;
    resetBtn.querySelector('span') && (resetBtn.querySelector('span').textContent = zoomText);
    resetBtn.childNodes[resetBtn.childNodes.length - 1].textContent = ' ' + zoomText;

    const isZoomed = zoom > 1.05;
    resetBtn.classList.toggle('visible', isZoomed);

    if (showUI) {
      indicator.classList.add('visible');
      clearTimeout(zoomHideTimer);
      zoomHideTimer = setTimeout(() => {
        // Ocultar indicador si no está haciendo pinch
        if (!isPinching) indicator.classList.remove('visible');
      }, 2000);
    }
  }

  function resetZoom() {
    applyZoom(1.0);
  }

  // ── ZOOM — PINCH TO ZOOM ───────────────────────────────────────────────────
  let isPinching      = false;
  let pinchStartDist  = 0;
  let pinchStartZoom  = 1.0;

  function getDistance(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.hypot(dx, dy);
  }

  function initPinchZoom() {
    const viewport = document.getElementById('viewport');

    viewport.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        isPinching = true;
        pinchStartDist = getDistance(e.touches);
        pinchStartZoom = currentZoom;
        e.preventDefault();
      }
    }, { passive: false });

    viewport.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && isPinching) {
        const dist  = getDistance(e.touches);
        const ratio = dist / pinchStartDist;
        applyZoom(pinchStartZoom * ratio);
        e.preventDefault();
      }
    }, { passive: false });

    viewport.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) {
        isPinching = false;
        // Ocultar indicador tras 1.5s de soltar
        clearTimeout(zoomHideTimer);
        zoomHideTimer = setTimeout(() => {
          document.getElementById('zoomIndicator').classList.remove('visible');
        }, 1500);
      }
    }, { passive: true });

    // Doble tap para reset zoom
    let lastTap = 0;
    viewport.addEventListener('touchend', (e) => {
      if (e.touches.length > 0) return;
      const now = Date.now();
      if (now - lastTap < 300) {
        resetZoom();
      }
      lastTap = now;
    }, { passive: true });

    // Mouse wheel (desktop / trackpad)
    viewport.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY * -0.005;
      applyZoom(currentZoom + delta);
    }, { passive: false });
  }

  // ── QRNG ───────────────────────────────────────────────────────────────────
  async function fillQuantumPool() {
    if (qrngLoading) return;
    qrngLoading = true;
    try {
      const res  = await fetch(`${WORKER_URL}/qrng?length=256`, { cache: 'no-store' });
      const data = await res.json();
      if (res.ok && data.numbers?.length > 0) quantumPool = data.numbers;
    } catch(e) {}
    finally { qrngLoading = false; }
  }

  function getQuantumByte() {
    if (quantumPool.length < 20 && !qrngLoading) fillQuantumPool();
    if (quantumPool.length > 0) return quantumPool.pop();
    return Math.floor(Math.random() * 256);
  }

  // ── TIRADA ─────────────────────────────────────────────────────────────────
  function drawTrio() {
    const cards = CARDS[currentLang];
    let i0, i1, i2;
    do {
      i0 = getQuantumByte() % 22;
      i1 = getQuantumByte() % 22;
      i2 = getQuantumByte() % 22;
    } while (i0 === i1 || i0 === i2 || i1 === i2);
    return [cards[i0], cards[i1], cards[i2]];
  }

  function newTrio(animate = false) {
    currentTrio = drawTrio();
    updateTrioBadges(animate);
    updateHUD();
  }

  function updateTrioBadges(animate = false) {
    if (animate) {
      const btn = document.getElementById('refreshTrio');
      btn.classList.add('spinning');
      setTimeout(() => btn.classList.remove('spinning'), 500);
    }
  }

  // ── HUD ────────────────────────────────────────────────────────────────────
  function formatDateTime() {
    const now = new Date();
    return now.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' })
      + ' · '
      + now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  }

  function updateHUD() {
    document.getElementById('cardsDisplay').textContent =
      currentTrio.length === 3 ? currentTrio.join('  ·  ') : '— · — · —';
    document.getElementById('metaDisplay').textContent = formatDateTime();
  }

  setInterval(() => {
    document.getElementById('metaDisplay').textContent = formatDateTime();
  }, 60000);

  // ── IDIOMA ─────────────────────────────────────────────────────────────────
  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('arkana-lang', lang);
    applyLang(lang);
    if (currentTrio.length === 3) { newTrio(true); }
  }

  function applyLang(lang) {
    document.getElementById('langES').classList.toggle('active', lang === 'es');
    document.getElementById('langEN').classList.toggle('active', lang === 'en');
  }

  // ── FORMATO ────────────────────────────────────────────────────────────────
  function setFormat(mode) {
    squareMode = mode === 'square';
    document.getElementById('btnFree').classList.toggle('active',   !squareMode);
    document.getElementById('btnSquare').classList.toggle('active',  squareMode);
    updateSquareGuide();
  }

  function updateSquareGuide() {
    const vp     = document.getElementById('viewport');
    const guide  = document.getElementById('squareGuide');
    const mTop   = document.getElementById('sqTop');
    const mBot   = document.getElementById('sqBottom');
    const mLeft  = document.getElementById('sqLeft');
    const mRight = document.getElementById('sqRight');

    if (!squareMode) {
      guide.classList.remove('visible');
      [mTop, mBot, mLeft, mRight].forEach(m => m.style.opacity = '0');
      return;
    }

    const vpW  = vp.clientWidth;
    const vpH  = vp.clientHeight;
    const size = Math.min(vpW, vpH);
    const ox   = (vpW - size) / 2;
    const oy   = (vpH - size) / 2;

    guide.style.width  = size + 'px';
    guide.style.height = size + 'px';
    guide.classList.add('visible');

    mTop.style.cssText   = `top:0;left:0;right:0;height:${oy}px;opacity:1;`;
    mBot.style.cssText   = `bottom:0;left:0;right:0;height:${oy}px;opacity:1;`;
    mLeft.style.cssText  = `top:${oy}px;bottom:${oy}px;left:0;width:${ox}px;opacity:1;`;
    mRight.style.cssText = `top:${oy}px;bottom:${oy}px;right:0;width:${ox}px;opacity:1;`;
  }

  // ── DISPARO ────────────────────────────────────────────────────────────────
  function shoot() {
    const video   = document.getElementById('video');
    const canvas  = document.getElementById('canvas');
    const vp      = document.getElementById('viewport');
    const ctx     = canvas.getContext('2d');
    const vidW    = video.videoWidth  || 1280;
    const vidH    = video.videoHeight || 720;

    // Flash
    const flash = document.getElementById('flashOverlay');
    flash.classList.add('flash');
    setTimeout(() => flash.classList.remove('flash'), 180);

    // Dimensiones de salida
    let outW, outH;
    if (squareMode) { outW = 1080; outH = 1080; }
    else {
      const dpr = window.devicePixelRatio || 1;
      outW = vp.clientWidth  * dpr;
      outH = vp.clientHeight * dpr;
    }
    canvas.width  = outW;
    canvas.height = outH;

    // Usar la función de render compartida
    drawFrameToCanvas(ctx, outW, outH, video);

    // Mostrar preview
    document.getElementById('previewImg').src = canvas.toDataURL('image/jpeg', 0.93);
    document.getElementById('preview').classList.add('active');
  }

  function closePreview() {
    document.getElementById('preview').classList.remove('active');
  }

  function downloadPhoto() {
    const dataUrl  = document.getElementById('canvas').toDataURL('image/jpeg', 0.93);
    const filename = currentTrio.length === 3
      ? `arkana-${currentTrio[0].replace(/\s/g,'')}-${Date.now()}.jpg`
      : `arkana-cam-${Date.now()}.jpg`;
    const a = document.createElement('a');
    a.href = dataUrl; a.download = filename; a.click();
  }

  async function sharePhoto() {
    const caption = currentTrio.length === 3
      ? `${currentTrio[0]} · ${currentTrio[1]} · ${currentTrio[2]} — Radio Arkana #RadioArkana #ArkanaCAM`
      : 'Radio Arkana · Arkana CAM #RadioArkana';

    if (navigator.share) {
      document.getElementById('canvas').toBlob(async blob => {
        const file = new File([blob], 'arkana-cam.jpg', { type: 'image/jpeg' });
        try { await navigator.share({ files: [file], title: 'Arkana CAM', text: caption }); }
        catch(e) { downloadPhoto(); }
      }, 'image/jpeg', 0.93);
    } else {
      downloadPhoto();
    }
  }

  // ── HANDLE ─────────────────────────────────────────────────────────────────
  function restoreHandle() {
    document.getElementById('handleInput').value = localStorage.getItem('arkana-handle') || '';
  }
  document.getElementById('handleInput').addEventListener('input', e => {
    const val = e.target.value.replace(/[@\s]/g, '').slice(0, 32);
    e.target.value = val;
    localStorage.setItem('arkana-handle', val);
  });

  // ── MODE SYSTEM ────────────────────────────────────────────────────────────
  let currentMode = 'photo'; // 'photo' | 'video' | 'archive'

  function setMode(mode) {
    // Si estamos grabando, no permitir cambio de modo
    if (isRecording) return;

    currentMode = mode;
    ['photo','video','archive'].forEach(m => {
      document.getElementById('mode' + m.charAt(0).toUpperCase() + m.slice(1))
        .classList.toggle('active', m === mode);
    });

    const shutter = document.getElementById('shutter');
    if (mode === 'video') {
      shutter.classList.add('rec-mode');
      shutter.classList.remove('recording');
    } else {
      shutter.classList.remove('rec-mode', 'recording');
    }

    // Modo archivo: abrir el panel
    if (mode === 'archive') {
      openArchivePanel();
      // Volver visualmente al modo anterior en el switcher
      // (el modo efectivo de disparo sigue siendo foto)
      setTimeout(() => {
        document.getElementById('modeArchive').classList.remove('active');
        document.getElementById('modePhoto').classList.add('active');
        currentMode = 'photo';
      }, 0);
    }
  }

  function handleShutter() {
    if (currentMode === 'video') {
      if (!isRecording) startRecording();
      else stopRecording();
    } else {
      shoot();
    }
  }

  // ── GRABACIÓN DE VÍDEO (canvas captureStream) ──────────────────────────────
  let isRecording      = false;
  let mediaRecorder    = null;
  let recordedChunks   = [];
  let recStartTime     = 0;
  let recTimerInterval = null;
  let recRafId         = null;
  let recCanvas        = null;
  let recCtx           = null;
  let recVideoBlob     = null;

  async function startRecording() {
    const video = document.getElementById('video');
    if (!video.videoWidth) return;

    isRecording    = true;
    recordedChunks = [];
    recVideoBlob   = null;

    // Canvas de grabación — resolución del stream
    recCanvas        = document.createElement('canvas');
    recCanvas.width  = video.videoWidth;
    recCanvas.height = video.videoHeight;
    recCtx           = recCanvas.getContext('2d');

    // Render loop — dibuja frame + overlays a 30fps
    function renderFrame() {
      if (!isRecording) return;
      recRafId = requestAnimationFrame(renderFrame);
      drawFrameToCanvas(recCtx, recCanvas.width, recCanvas.height, video);
    }
    renderFrame();

    // Capturar stream del canvas
    let stream;
    try {
      stream = recCanvas.captureStream(30);
    } catch(e) {
      console.error('captureStream no soportado:', e);
      isRecording = false;
      return;
    }

    // Elegir codec disponible
    const mimeTypes = [
      'video/webm;codecs=vp9',
      'video/webm;codecs=vp8',
      'video/webm',
      'video/mp4',
    ];
    const mimeType = mimeTypes.find(t => MediaRecorder.isTypeSupported(t)) || '';

    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = onRecordingStop;
    mediaRecorder.start(100); // chunk cada 100ms

    // UI
    const shutter = document.getElementById('shutter');
    shutter.classList.remove('rec-mode');
    shutter.classList.add('recording');
    document.getElementById('recIndicator').classList.add('visible');
    recStartTime = Date.now();
    recTimerInterval = setInterval(updateRecTimer, 500);
    updateRecTimer();
    document.getElementById('onAirBadge') && document.getElementById('onAirBadge');
  }

  function stopRecording() {
    if (!mediaRecorder || !isRecording) return;
    isRecording = false;
    mediaRecorder.stop();
    cancelAnimationFrame(recRafId);
    clearInterval(recTimerInterval);

    const shutter = document.getElementById('shutter');
    shutter.classList.remove('recording');
    shutter.classList.add('rec-mode');
    document.getElementById('recIndicator').classList.remove('visible');
  }

  function onRecordingStop() {
    const mimeType = mediaRecorder.mimeType || 'video/webm';
    recVideoBlob = new Blob(recordedChunks, { type: mimeType });
    const url = URL.createObjectURL(recVideoBlob);
    const pv  = document.getElementById('previewVideo');
    pv.src    = url;
    pv.load();
    document.getElementById('videoPreview').classList.add('active');
  }

  function updateRecTimer() {
    const elapsed = Math.floor((Date.now() - recStartTime) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    document.getElementById('recTimer').textContent = `${m}:${s}`;
  }

  // Render de un frame completo al canvas (igual que shoot() pero continuo)
  function drawFrameToCanvas(ctx, outW, outH, video) {
    const vidW = video.videoWidth  || outW;
    const vidH = video.videoHeight || outH;
    const effectiveZoom = nativeZoomSupported ? 1.0 : currentZoom;
    const scale = Math.max(outW / vidW, outH / vidH) * effectiveZoom;
    const drawW = vidW * scale;
    const drawH = vidH * scale;
    const offX  = (outW - drawW) / 2;
    const offY  = (outH - drawH) / 2;

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.drawImage(video, offX, offY, drawW, drawH);

    // Overlay de archivo (si está activo)
    if (overlayImage) {
      const ov = document.getElementById('overlayOpacity');
      ctx.globalAlpha = (ov ? parseInt(ov.value) / 100 : 0.42);
      ctx.globalCompositeOperation = 'screen';
      const os = Math.max(outW / overlayImage.naturalWidth, outH / overlayImage.naturalHeight);
      const ow = overlayImage.naturalWidth  * os;
      const oh = overlayImage.naturalHeight * os;
      ctx.drawImage(overlayImage, (outW - ow) / 2, (outH - oh) / 2, ow, oh);
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
    }

    // Gradiente inferior
    const gradH = outH * 0.30;
    const grad  = ctx.createLinearGradient(0, outH - gradH, 0, outH);
    grad.addColorStop(0,   'rgba(0,0,0,0)');
    grad.addColorStop(0.4, 'rgba(0,0,0,0.58)');
    grad.addColorStop(1,   'rgba(0,0,0,0.85)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, outH - gradH, outW, gradH);

    // Watermark
    const wmSize = Math.round(outW * 0.018);
    ctx.font      = `700 ${wmSize}px "Space Mono", monospace`;
    ctx.fillStyle = 'rgba(230,48,48,0.85)';
    ctx.textAlign = 'right';
    ctx.shadowColor = 'rgba(0,0,0,0.95)';
    ctx.shadowBlur  = 6;
    ctx.fillText('ARKANA CAM', outW - Math.round(outW * 0.02), Math.round(outH * 0.05));

    // REC badge (solo durante grabación)
    if (isRecording) {
      const recSize = Math.round(outW * 0.016);
      ctx.font      = `700 ${recSize}px "Space Mono", monospace`;
      ctx.fillStyle = 'rgba(230,48,48,0.9)';
      ctx.textAlign = 'left';
      ctx.shadowBlur = 4;
      const elapsed = Math.floor((Date.now() - recStartTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      // Punto parpadeante (visible ~50% del tiempo)
      if (Math.floor(Date.now() / 500) % 2 === 0) {
        ctx.fillText(`● REC ${m}:${s}`, Math.round(outW * 0.02), Math.round(outH * 0.05));
      }
    }

    // Cartas
    const cardsSize  = Math.round(outH * 0.055);
    const lineHeight = cardsSize * 1.08;
    const padX       = Math.round(outW * 0.022);
    const maxTextW   = outW - padX * 2;
    ctx.font        = `${cardsSize}px 'Bebas Neue', sans-serif`;
    ctx.fillStyle   = '#f0ece4';
    ctx.textAlign   = 'left';
    ctx.shadowColor = 'rgba(0,0,0,0.9)';
    ctx.shadowBlur  = 12;
    const trio  = currentTrio.length === 3 ? currentTrio : ['—','—','—'];
    const words = trio.join('  ·  ').split(' ');
    const lines = []; let cur = '';
    for (const w of words) {
      const test = cur ? cur + ' ' + w : w;
      if (ctx.measureText(test).width > maxTextW && cur) { lines.push(cur); cur = w; }
      else cur = test;
    }
    if (cur) lines.push(cur);
    const baseY  = outH - Math.round(outH * 0.07);
    const totalH = lines.length * lineHeight;
    const startY = baseY - totalH + lineHeight * 0.85;
    lines.forEach((l, i) => ctx.fillText(l, padX, startY + i * lineHeight));

    // Meta
    const metaSize = Math.round(outH * 0.017);
    const metaY    = outH - Math.round(outH * 0.026);
    ctx.font        = `${metaSize}px 'Space Mono', monospace`;
    ctx.shadowBlur  = 5;
    const handle = (localStorage.getItem('arkana-handle') || '').trim();
    ctx.fillStyle   = '#e63030';
    ctx.textAlign   = 'left';
    ctx.fillText(handle ? '@' + handle : formatDateTime(), padX, metaY);
    ctx.textAlign   = 'right';
    ctx.fillText(handle ? 'radioarkana.com · ' + formatDateTime() : 'radioarkana.com', outW - padX, metaY);
    ctx.shadowBlur  = 0;
    ctx.textAlign   = 'left';
  }

  function closeVideoPreview() {
    document.getElementById('videoPreview').classList.remove('active');
    const pv = document.getElementById('previewVideo');
    pv.pause();
    pv.src = '';
  }

  function downloadVideo() {
    if (!recVideoBlob) return;
    const ext = recVideoBlob.type.includes('mp4') ? 'mp4' : 'webm';
    const filename = currentTrio.length === 3
      ? `arkana-${currentTrio[0].replace(/\s/g,'')}-${Date.now()}.${ext}`
      : `arkana-cam-${Date.now()}.${ext}`;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(recVideoBlob);
    a.download = filename;
    a.click();
  }

  async function shareVideo() {
    if (!recVideoBlob) return;
    const ext  = recVideoBlob.type.includes('mp4') ? 'mp4' : 'webm';
    const caption = currentTrio.length === 3
      ? `${currentTrio[0]} · ${currentTrio[1]} · ${currentTrio[2]} — Radio Arkana #RadioArkana #ArkanaCAM`
      : 'Radio Arkana · Arkana CAM #RadioArkana';
    if (navigator.share) {
      const file = new File([recVideoBlob], `arkana-cam.${ext}`, { type: recVideoBlob.type });
      try { await navigator.share({ files: [file], title: 'Arkana CAM', text: caption }); }
      catch(e) { downloadVideo(); }
    } else {
      downloadVideo();
    }
  }

  // ── ARCHIVE OVERLAY ────────────────────────────────────────────────────────
  let archiveImages   = []; // { dataUrl, img }
  let selectedArchIdx = -1;
  let overlayImage    = null; // HTMLImageElement activo

  function openArchivePanel() {
    document.getElementById('archivePanel').classList.add('active');
    selectedArchIdx = -1;
    document.getElementById('btnApplyOverlay').disabled = true;
    renderArchiveGrid();
  }

  function closeArchivePanel() {
    document.getElementById('archivePanel').classList.remove('active');
  }

  function loadArchiveImages(event) {
    const files = Array.from(event.target.files);
    let loaded = 0;
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.src   = e.target.result;
        archiveImages.push({ dataUrl: e.target.result, img });
        loaded++;
        if (loaded === files.length) renderArchiveGrid();
      };
      reader.readAsDataURL(file);
    });
    // Reset input para poder volver a cargar los mismos archivos
    event.target.value = '';
  }

  function renderArchiveGrid() {
    const grid = document.getElementById('archiveGrid');
    // Mantener el botón de carga (primer hijo)
    const uploadLabel = grid.firstElementChild;
    grid.innerHTML = '';
    grid.appendChild(uploadLabel);

    archiveImages.forEach((item, idx) => {
      const img = document.createElement('img');
      img.className = 'arch-thumb' + (idx === selectedArchIdx ? ' selected' : '');
      img.src = item.dataUrl;
      img.onclick = () => selectArchiveImage(idx);
      grid.appendChild(img);
    });
  }

  function selectArchiveImage(idx) {
    selectedArchIdx = idx;
    document.getElementById('btnApplyOverlay').disabled = false;
    renderArchiveGrid();
  }

  function applySelectedOverlay() {
    if (selectedArchIdx < 0) return;
    overlayImage = archiveImages[selectedArchIdx].img;

    const el = document.getElementById('overlayImgEl');
    el.src = overlayImage.src;
    el.classList.add('visible');
    document.getElementById('overlayControls').classList.add('visible');
    document.getElementById('archiveActiveBar').classList.add('visible');

    closeArchivePanel();
    // Asegurar que estamos en modo foto
    currentMode = 'photo';
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('modePhoto').classList.add('active');
  }

  function removeOverlay() {
    overlayImage = null;
    const el = document.getElementById('overlayImgEl');
    el.src = '';
    el.classList.remove('visible');
    document.getElementById('overlayControls').classList.remove('visible');
    document.getElementById('archiveActiveBar').classList.remove('visible');
  }

  // Sincronizar slider de opacidad con el elemento CSS
  document.getElementById('overlayOpacity').addEventListener('input', e => {
    const val = e.target.value / 100;
    document.getElementById('overlayImgEl').style.opacity = val;
  });

  // ── SERVICE WORKER ─────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }

  // ── RESIZE: recalcular guide ────────────────────────────────────────────────
  window.addEventListener('resize', updateSquareGuide);
</script>
</body>
</html>
